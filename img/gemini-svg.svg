<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond Mystique (Dégradé radial pour l'effet nébuleuse) -->
  <defs>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0b3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050510;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="450" fill="url(#nebula)" />
  
  <!-- En-tête -->
  <!-- Icône Cerveau (Style Pixel-art simplifié) -->
  <g transform="translate(20,20)">
    <rect width="40" height="40" fill="#888" rx="5" />
    <circle cx="20" cy="20" r="10" fill="#555" />
    <path d="M15 20 L25 20 M20 15 L20 25" stroke="#333" stroke-width="2" />
  </g>
  
  <!-- Titre "Flash-Cards" -->
  <rect x="300" y="20" width="200" height="40" fill="#2c2c2c" stroke="#555" stroke-width="2" rx="5" />
  <text x="400" y="47" font-family="serif" font-size="20" fill="#ffd700" text-anchor="middle" font-weight="bold">FLASH-CARDS</text>

  <!-- Carte Centrale -->
  <!-- Bordure dorée -->
  <rect x="200" y="100" width="400" height="220" fill="#f4e4bc" stroke="#b8860b" stroke-width="6" rx="10" />
  
  <!-- Section Question -->
  <text x="400" y="140" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="middle" font-weight="bold">« QUESTION : »</text>
  <text x="400" y="180" font-family="serif" font-size="14" fill="#000" text-anchor="middle">Quel empereur romain a fait construire</text>
  <text x="400" y="200" font-family="serif" font-size="14" fill="#000" text-anchor="middle">le Colisée à Rome ?</text>
  
  <!-- Section Réponse (Fond brun-rougeâtre) -->
  <rect x="250" y="230" width="300" height="50" fill="#8b0000" rx="5" />
  <text x="400" y="260" font-family="sans-serif" font-size="14" fill="#ffd700" text-anchor="middle" font-weight="bold">« RÉPONSE »</text>

  <!-- Boutons d'Action -->
  <!-- Bouton CORRECT -->
  <g filter="url(#glow)">
    <rect x="230" y="360" width="140" height="45" fill="#2e2e2e" stroke="#00ff00" stroke-width="3" rx="10" />
    <text x="300" y="388" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">CORRECT ✓</text>
  </g>
  
  <!-- Bouton WRONG -->
  <g filter="url(#glow)">
    <rect x="430" y="360" width="140" height="45" fill="#2e2e2e" stroke="#ff0000" stroke-width="3" rx="10" />
    <text x="500" y="388" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">WRONG ✗</text>
  </g>
</svg>
